spring:
  application:
    name: bbgreen
  datasource:
    url: jdbc:postgresql://localhost:5432/app_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:/db/migration
  jpa:
    hibernate:
      ddl-auto: validate
#      ddl-auto: none
#    properties:
#      hibernate:
#        temp:
#          use_jdbc_metadata_defaults: false

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: jp.ponkichi.bbgreen

jwt:
  secret: your-256-bit-extremely-secret-key-at-least-32-characters-long
  expiration: 86400000
